  <text class="st0" transform="translate(484.23 58.9)"><tspan x="0" y="0">다운로드</tspan></text>
  <text class="st0" transform="translate(31.6 87.68)"><tspan x="0" y="0">1. 신청자의 신청공문 및 인증신청서</tspan></text>
  <text class="st0" transform="translate(31.6 112.52)"><tspan x="0" y="0">2. 자체 평가서</tspan><tspan class="st3"><tspan x="0" y="10.64">- 점수집계표에 자체평가 점수 기재 및 각각의 평가항목 산출기준 세부항목에 해당하는 점수란 배경에 회색으로 표시함</tspan></tspan></text>
  <text class="st0" transform="translate(31.6 147.98)"><tspan x="0" y="0">3. 자체평가서에 포함된 내용이 사실임을 증명할 수 있는 자료</tspan><tspan x="0" y="10.64">- 준공도면(건축, 조경, 토목 / 건축사 날인 필수) CAD파일(폰트파일 포함) 및 PDF파일</tspan><tspan x="0" y="21.27">- 자체평가서 항목별 평가 제출서류에 해당하는 사진</tspan></text>
  <text class="st0" transform="translate(31.6 194.09)"><tspan x="0" y="0">4. 1, 2, 3, 신청 접수를 위한 첨부서류 및 도서를 이메일(pbpb24@naver.com)로 제출</tspan></text>
  <text class="st0" transform="translate(31.9 31.85)"><tspan x="0" y="0">본인증 신청관련 서류</tspan></text>
  <text class="st0" transform="translate(31.9 58.55)"><tspan x="0" y="0">본인증 신청관련 서류 목록</tspan></text>
