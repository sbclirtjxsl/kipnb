  <text class="st1"><tspan x="92.17" y="162.58">제 4조(인증 수수료)</tspan><tspan x="92.17" y="197.98">① 규칙 제12조의3제1항에 따른 인증 수수료는 별표 8과 같다.</tspan><tspan x="92.17" y="233.38">② 규칙 제12조의3제1항에 따른 인증 연장 수수료는 제1항 인증 수수료의 100분의 50으로 한다. 다만, 인증대상시설에 대한 재평가(증축,개축 등)가 필요할 때에는 그러하지 아니할 수 있다.</tspan><tspan x="92.17" y="268.78">③ 「사회복지사업법」 제21항 인증 수수료의 100분의 50으로 할 수 있다. 다만, 인증 연장을 신청하는 경우에는 그러하지 아니한다.</tspan><tspan x="92.17" y="304.18">④ 도서지역으로 항공료 및 선박비용이 발생(왕복실비)하는 경우에는 소유자등이 추가로 납부하여야 한다.</tspan><tspan x="92.17" y="374.98">부칙 제1조</tspan><tspan x="92.17" y="410.38">- 제1조(시행일) 이 고시는 2018년 8월 10일부터 시행한다. 다만, 별표8의 개정규정은 2019년 1월1일부터 시행한다.</tspan></text>
  <text class="st2" transform="translate(606.57 98.45)"><tspan x="0" y="0">장애물 없는 생활환경(BF) 인증심사기준 및 수수료기준등</tspan></text>
