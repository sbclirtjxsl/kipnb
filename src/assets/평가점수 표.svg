  <text class="st0" transform="translate(335.47 67.21)"><tspan x="0" y="0">「장애물</tspan><tspan class="st16" x="28.11" y="0"> </tspan><tspan x="33.34" y="0">없는</tspan><tspan class="st12" x="50.01" y="0"> </tspan><tspan x="55.25" y="0">생활환경</tspan><tspan class="st16" x="88.57" y="0"> </tspan><tspan x="93.81" y="0">인증에</tspan><tspan class="st16" x="118.81" y="0"> </tspan><tspan x="124.04" y="0">관한</tspan><tspan class="st12" x="140.71" y="0"> </tspan><tspan x="145.94" y="0">규칙」제2조제1호가목에 </tspan><tspan x="0" y="10.64">따른</tspan><tspan class="st7" x="16.66" y="10.64"> </tspan><tspan x="20.87" y="10.64">대상시설은</tspan><tspan class="st13" x="62.53" y="10.64"> </tspan><tspan x="66.74" y="10.64">제8조에</tspan><tspan class="st7" x="97.1" y="10.64"> </tspan><tspan x="101.31" y="10.64">따른</tspan><tspan class="st13" x="117.98" y="10.64"> </tspan><tspan x="122.18" y="10.64">인증</tspan><tspan class="st7" x="138.85" y="10.64"> </tspan><tspan x="143.05" y="10.64">기준의</tspan><tspan class="st13" x="168.05" y="10.64"> </tspan><tspan x="172.25" y="10.64">항목별</tspan><tspan class="st7" x="197.25" y="10.64"> </tspan><tspan x="201.46" y="10.64">최소기준 </tspan><tspan x="0" y="21.27">이상을</tspan><tspan class="st3" x="25" y="21.27"> </tspan><tspan x="30.35" y="21.27">충족하여야</tspan><tspan class="st3" x="72.01" y="21.27"> </tspan><tspan x="77.37" y="21.27">하고,</tspan><tspan class="st11" x="96.72" y="21.27"> </tspan><tspan x="102.07" y="21.27">이를</tspan><tspan class="st3" x="118.74" y="21.27"> </tspan><tspan x="124.09" y="21.27">충족하지</tspan><tspan class="st3" x="157.42" y="21.27"> </tspan><tspan x="162.77" y="21.27">아니하는</tspan><tspan class="st3" x="196.1" y="21.27"> </tspan><tspan x="201.46" y="21.27">경우에는 </tspan><tspan x="0" y="31.91">인증등급을</tspan><tspan class="st14" x="41.66" y="31.91"> </tspan><tspan x="46.5" y="31.91">부여하지</tspan><tspan class="st14" x="79.83" y="31.91"> </tspan><tspan x="84.66" y="31.91">아니함.</tspan><tspan class="st10" x="112.34" y="31.91"> </tspan><tspan x="117.18" y="31.91">「장애물</tspan><tspan class="st14" x="145.29" y="31.91"> </tspan><tspan x="150.12" y="31.91">없는</tspan><tspan class="st14" x="166.79" y="31.91"> </tspan><tspan x="171.62" y="31.91">생활환경</tspan><tspan class="st14" x="204.95" y="31.91"> </tspan><tspan x="209.79" y="31.91">인증에 </tspan><tspan x="0" y="42.55">관한</tspan><tspan class="st2" x="16.66" y="42.55"> </tspan><tspan x="19.32" y="42.55">규칙」</tspan><tspan class="st5" x="39.09" y="42.55"> </tspan><tspan x="41.75" y="42.55">제2조제1호나목</tspan><tspan class="st2" x="102.48" y="42.55"> </tspan><tspan x="105.14" y="42.55">및</tspan><tspan class="st2" x="113.47" y="42.55"> </tspan><tspan x="116.13" y="42.55">같은</tspan><tspan class="st2" x="132.79" y="42.55"> </tspan><tspan x="135.45" y="42.55">조</tspan><tspan class="st5" x="143.78" y="42.55"> </tspan><tspan x="146.43" y="42.55">제2호에</tspan><tspan class="st2" x="176.8" y="42.55"> </tspan><tspan x="179.45" y="42.55">따른</tspan><tspan class="st2" x="196.12" y="42.55"> </tspan><tspan x="198.77" y="42.55">교통수단, </tspan><tspan x="0" y="53.18">여객시설,</tspan><tspan class="st15" x="36.01" y="53.18"> </tspan><tspan x="40.16" y="53.18">도로</tspan><tspan class="st6" x="56.82" y="53.18"> </tspan><tspan x="60.97" y="53.18">및</tspan><tspan class="st15" x="69.3" y="53.18"> </tspan><tspan x="73.45" y="53.18">지역의</tspan><tspan class="st6" x="98.44" y="53.18"> </tspan><tspan x="102.59" y="53.18">경우</tspan><tspan class="st15" x="119.25" y="53.18"> </tspan><tspan x="123.4" y="53.18">「교통약자의</tspan><tspan class="st6" x="168.17" y="53.18"> </tspan><tspan x="172.32" y="53.18">이동편의</tspan><tspan class="st15" x="205.65" y="53.18"> </tspan><tspan x="209.79" y="53.18">증진법 </tspan><tspan x="0" y="63.82">시행규칙」</tspan><tspan class="st4" x="36.44" y="63.82"> </tspan><tspan x="38.72" y="63.82">제2조</tspan><tspan class="st4" x="60.76" y="63.82"> </tspan><tspan x="63.04" y="63.82">및</tspan><tspan class="st4" x="71.38" y="63.82"> </tspan><tspan x="73.66" y="63.82">별표</tspan><tspan class="st4" x="90.33" y="63.82"> </tspan><tspan x="92.61" y="63.82">1에</tspan><tspan class="st4" x="106.31" y="63.82"> </tspan><tspan x="108.6" y="63.82">따른</tspan><tspan class="st4" x="125.26" y="63.82"> </tspan><tspan x="127.55" y="63.82">기준을</tspan><tspan class="st4" x="152.54" y="63.82"> </tspan><tspan x="154.83" y="63.82">충족하여야하고,</tspan><tspan class="st4" x="215.84" y="63.82"> </tspan><tspan x="218.12" y="63.82">이를 </tspan><tspan x="0" y="74.46" xml:space="preserve">충족하지 아니하는 경우에는 인증등급을 부여하지 아니한다.        </tspan></text>
